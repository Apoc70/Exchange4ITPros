<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Expiration Reminder</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; color: #222222; margin: 0; padding: 0;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto;">
        <tr>
            <td style="padding: 24px;">
                <p>Hello {DisplayName},</p>
                <p>Your network password will expire in <strong>{DaysRemaining} day(s)</strong>, on <strong>{ExpiryDate}</strong>.</p>
                <p>Please change your password before it expires to avoid being locked out of your account.</p>
                <p>If you have any questions, please contact the IT Service Desk.</p>
                <p>Kind regards,<br>IT Service Desk</p>
            </td>
        </tr>
    </table>
</body>
</html>
